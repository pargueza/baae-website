backend:
  name: git-gateway
 
media_folder: public/images
public_folder: /images
 
collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Featured Image", name: "heroImage", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
 
  - name: "pages"
    label: "Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "src/pages/home.astro"
        fields:
          - { label: "Title", name: "title", widget: "string" }
      - label: "FAQs"
        name: "faqs"
        file: "src/pages/faqs.astro"
        fields:
          - { label: "Title", name: "title", widget: "string" }
      - label: "Events"
        name: "events"
        file: "src/pages/events.astro"
        fields:
          - { label: "Title", name: "title", widget: "string" }
      - label: "Contact"
        name: "contact"
        file: "src/pages/contact.astro"
        fields:
          - { label: "Title", name: "title", widget: "string" }
      - label: "Team"
        name: "team"
        file: "src/pages/team.astro"
        fields:
          - { label: "Title", name: "title", widget: "string" }